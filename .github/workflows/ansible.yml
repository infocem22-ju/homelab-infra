name: Ansible deploy

on:
  push:
    branches:
      - master
    paths:
      - 'ansible/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier les containers Podman
        run: |
          COUNT=$(podman ps --filter "label=homelab.project=demo" --format '{{.Names}}' | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "Aucun container lab actif, abandon."
            exit 1
          fi
          echo "$COUNT container(s) actif(s)"

      - name: Run playbook
        working-directory: ansible
        run: |
          ansible-playbook playbooks/lab_site.yml \
            --private-key ~/.ssh/homelab_ansible_ed25519 \
            -i inventory/inventory.yml